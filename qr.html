<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generate QR Code</title>
  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #fff0f5; font-family: Arial, sans-serif; color: #4a1630; }
    .card { width: min(540px, 100%); padding: 28px; background: rgba(255,255,255,0.92); border-radius: 28px; box-shadow: 0 30px 80px rgba(210, 90, 121, 0.16); text-align: center; }
    h1 { margin: 0 0 18px; font-size: 1.9rem; }
    input { width: 100%; padding: 14px 16px; border-radius: 18px; border: 1px solid #f1c3d3; font-size: 1rem; margin-bottom: 18px; }
    button { padding: 14px 24px; border: none; border-radius: 999px; background: linear-gradient(135deg, #f47f9c, #f9c57f); color: #fff; font-weight: 700; cursor: pointer; }
    #qrcode { margin-top: 24px; }
    .hint { margin-top: 10px; font-size: 0.92rem; color: #8c5b72; }
  </style>
</head>
<body>
  <div class="card">
    <h1>QR Code Generator</h1>
    <p>Paste the final URL for your birthday page and create the QR code to send.</p>
    <input id="urlInput" type="text" placeholder="https://example.com/birthday" value="" />
    <button id="generateBtn">Generate QR Code</button>
    <div id="qrcode"></div>
    <div class="hint">Host your page somewhere accessible, then use the generated code.</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    const generateBtn = document.getElementById('generateBtn');
    const urlInput = document.getElementById('urlInput');
    const qrcodeContainer = document.getElementById('qrcode');

    generateBtn.addEventListener('click', () => {
      const url = urlInput.value.trim();
      if (!url) {
        alert('Please enter the hosted page URL first.');
        return;
      }
      qrcodeContainer.innerHTML = '';
      new QRCode(qrcodeContainer, {
        text: url,
        width: 260,
        height: 260,
        correctLevel: QRCode.CorrectLevel.H,
      });
    });
  </script>
</body>
</html>
